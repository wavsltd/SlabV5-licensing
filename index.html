<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLab Tools</title>
<style>
  :root {
    --bg:#0d0d0f; --surface:#141416; --surface2:#1c1c1f;
    --border:#2a2a2e; --accent:#7100f4; --text:#d8d8d8;
    --muted:#666; --ok:#50c878; --danger:#e05050;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:32px;
    max-width:520px;
    width:100%;
  }
  .title {
    display:flex; align-items:center; gap:4px;
    font-size:1.4em; font-weight:800; color:#fff;
    letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px;
  }
  .title-s {
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; background:var(--accent); color:#fff;
    border-radius:6px; line-height:1; flex:0 0 auto;
  }
  .subtitle {
    font-size:0.78em; color:var(--muted);
    letter-spacing:0.08em; text-transform:uppercase; margin-bottom:28px;
  }
  label {
    display:block; font-size:0.72em; color:var(--muted);
    letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px;
  }
  input[type=password] {
    width:100%; padding:12px 14px;
    background:var(--surface2); border:1px solid var(--border);
    color:#fff; border-radius:8px;
    font-family:'Menlo','Courier New',monospace;
    font-size:1em; transition:border-color 0.15s;
    outline:none; margin-bottom:14px;
  }
  input[type=password]:focus { border-color:var(--accent); }
  button, .tool-link {
    width:100%; padding:13px;
    background:var(--accent); color:#fff;
    border:none; border-radius:8px;
    font-size:0.88em; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; transition:background 0.15s;
    text-decoration:none; display:flex; align-items:center; justify-content:center;
  }
  button:hover, .tool-link:hover { background:#9030ff; }
  .status {
    min-height:20px; font-size:0.8em; margin-bottom:12px;
    color:var(--danger);
  }
  .tools {
    display:none;
    margin-top:10px;
  }
  .tools.open { display:block; }
  .tool-list {
    display:flex; flex-direction:column; gap:10px; margin-top:12px;
  }
  .note {
    font-size:0.72em; color:var(--muted); line-height:1.5; margin-top:20px;
    padding-top:16px; border-top:1px solid var(--border);
  }
</style>
</head>
<body>
<div class="card">
  <div class="title"><span class="title-s">S</span><span>Lab Tools</span></div>
  <div class="subtitle">Protected Index</div>

  <div id="gate">
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="Enter password">
    <div id="status" class="status"></div>
    <button type="button" onclick="unlock()">Access Tools</button>
  </div>

  <div id="tools" class="tools">
    <label>Available Tools</label>
    <div class="tool-list">
      <a id="licenceLink" class="tool-link" href="#" target="_blank" rel="noopener">SLab Licence Generator</a>
      <a id="unlockLink" class="tool-link" href="#" target="_blank" rel="noopener">SLab Remote Unlock Calculator</a>
    </div>
  </div>

  <div class="note">
    Access lasts for 2 minutes after entering the password.<br>
  </div>
</div>

<script>
const LICENCE_URL = "https://wavsltd.github.io/SlabV5-licensing/SLab_Licence_Online%20Generator%20V5.04.html";
const UNLOCK_URL  = "https://wavsltd.github.io/SlabV5-licensing/SLab_Remote-Unlock%20Calculator.html";
const PASSWORD_HASH = "5ec924daacc1a2f33904881ddc660fa7ca7979b671e0b39e026fb877efb70e4d";

const COOKIE_NAME = "slab_auth";
const COOKIE_VALUE = "J1ffy_ok_2026";
const COOKIE_MAX_AGE = 120; // 2 minutes

document.getElementById("licenceLink").href = LICENCE_URL;
document.getElementById("unlockLink").href = UNLOCK_URL;

function setAuthCookie() {
  document.cookie = `${COOKIE_NAME}=${COOKIE_VALUE}; path=/; max-age=${COOKIE_MAX_AGE}; SameSite=Lax`;
}

function hasAuthCookie() {
  return document.cookie.split(";").some(c => c.trim() === `${COOKIE_NAME}=${COOKIE_VALUE}`);
}

async function sha256hex(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

function showTools() {
  document.getElementById("gate").style.display = "none";
  document.getElementById("tools").classList.add("open");
}

async function unlock() {
  const pw = document.getElementById("pw").value.trim();
  const status = document.getElementById("status");
  if (!pw) {
    status.textContent = "Enter the password.";
    return;
  }
  const hash = await sha256hex(pw);
  if (hash.toLowerCase() === PASSWORD_HASH.toLowerCase()) {
    status.textContent = "";
    setAuthCookie();
    showTools();
  } else {
    status.textContent = "Incorrect password.";
  }
}

if (hasAuthCookie()) {
  showTools();
}

document.getElementById("pw").addEventListener("keydown", (e) => {
  if (e.key === "Enter") unlock();
});
</script>
</body>
</html>
